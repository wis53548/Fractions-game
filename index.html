<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraction Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
        }
        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
    </style>
</head>

import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const ctx = canvas.getContext('2d', { alpha: false }); 
const qCanvas = document.getElementById('questionCanvas');
const qCtx = qCanvas.getContext('2d');

let CANVAS_HEIGHT = window.innerHeight;
canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

const TILE_SIZE = 40;

// Game State

let particles = [];
let tileMap = [];
let playerProjectiles = [];
let enemyProjectiles = [];

let mapHeight = 0;
let camera = { x: 0, y: 0 };

// Resize handler to ensure fullscreen playability
window.addEventListener('resize', () => {
    CANVAS_WIDTH = window.innerWidth;
    CANVAS_HEIGHT = window.innerHeight;
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
});

// --- FIREBASE INITIALIZATION ---
async function initFirebase() {
    if (typeof __firebase_config === 'undefined') return;
    try {
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupScoreboardListener();
            }
        });
    } catch (e) { console.error("Firebase Init Error:", e); }
}

function setupScoreboardListener() {
    if (!currentUser || !db) return;
    const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
    onSnapshot(scoresRef, (snapshot) => {
        let scores = [];
        snapshot.forEach(doc => scores.push(doc.data()));
        scores.sort((a, b) => b.score - a.score);
        renderScoreboard(scores.slice(0, 5)); // Top 5
    }, (error) => { console.error("Snapshot error:", error); });
}

async function saveScoreToCloud() {
    if (!currentUser || !db || !username || score === 0) return;
    try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'scores', currentUser.uid);
        await setDoc(docRef, {
            username: username,
            score: score,
            timestamp: Date.now()
        }, { merge: true });
    } catch (e) { console.error("Save score error:", e); }
}

function renderScoreboard(topScores) {
    const list = document.getElementById('scoreboard-list');
    list.innerHTML = '';
    if (topScores.length === 0) {
        list.innerHTML = '<div class="text-center text-slate-400 italic">No scores yet!</div>';
        return;
    }
    topScores.forEach((s, idx) => {
        const item = document.createElement('div');
        item.className = "flex justify-between items-center bg-slate-700 px-3 py-1 rounded";
        item.innerHTML = `
            <span class="font-bold truncate max-w-[100px]" title="${s.username}">${idx + 1}. ${s.username}</span>
            <span class="text-emerald-400 font-mono">${s.score}</span>
        `;
        list.appendChild(item);
    });
}

// --- MATH SYSTEM ---
const MathSystem = {
    generateQuestion(type) {
        let q = { text: "", options: [], correctIndex: 0, drawVisual: null };

        // Helper to resolve mixed types
        if (type === "mixed_1") {
            const types = ["add_like", "subtract_like", "equivalent"];
            type = types[Math.floor(Math.random() * types.length)];
        } else if (type === "mixed_2") {
            const types = ["add_unlike", "subtract_unlike", "multiply"];
            type = types[Math.floor(Math.random() * types.length)];
        } else if (type === "mixed_all") {
            const types = ["identify", "compare_like_den", "compare_like_num", "equivalent", "add_like", "subtract_like", "add_unlike", "subtract_unlike", "multiply"];
            type = types[Math.floor(Math.random() * types.length)];
        }

        if (type === "identify_simple" || type === "identify") {
            const denominators = type === "identify_simple" ? [2, 3, 4] : [5, 6, 8, 10];
            const d = denominators[Math.floor(Math.random() * denominators.length)];
            const n = Math.floor(Math.random() * (d - 1)) + 1; 
            q.text = "What fraction is shown below?";
            q.drawVisual = (ctx, w, h) => this.drawPieChart(ctx, w/2, h/2, Math.min(w,h)/2-10, n, d);
            
            let answers = [{n, d}, {n: n+1, d}, {n, d: d+1}, {n: d-n, d}];
            answers = answers.map(a => `${a.n}/${a.d}`);
            answers[0] = `${n}/${d}`;
            while(new Set(answers).size < 4) {
               answers[1] = `${Math.floor(Math.random()*3)+1}/${d}`;
               answers[2] = `${n}/${d+Math.floor(Math.random()*3)+1}`;
               answers[3] = `${Math.floor(Math.random()*4)+1}/${d+2}`;
            }
            q.options = this.shuffleOptions(answers);
            q.correctIndex = q.options.indexOf(`${n}/${d}`);

        } else if (type === "compare_like_den" || type === "compare_like_num" || type === "compare") {
            let n1, d1, n2, d2;
            let isLikeDen = type === "compare_like_den" || (type === "compare" && Math.random() > 0.5);
            
            if (isLikeDen) {
                const d = Math.floor(Math.random() * 6) + 4; // 4 to 9
                n1 = Math.floor(Math.random() * (d-1)) + 1;
                do { n2 = Math.floor(Math.random() * (d-1)) + 1; } while(n1 === n2);
                d1 = d; d2 = d;
            } else {
                const n = Math.floor(Math.random() * 4) + 1;
                d1 = Math.floor(Math.random() * 5) + n + 1;
                do { d2 = Math.floor(Math.random() * 5) + n + 1; } while(d1 === d2);
                n1 = n; n2 = n;
            }
            
            q.text = `Which fraction is larger?`;
            q.drawVisual = (ctx, w, h) => {
                 this.drawPieChart(ctx, w/2 - 80, h/2, 45, n1, d1);
                 this.drawPieChart(ctx, w/2 + 80, h/2, 45, n2, d2);
                 ctx.font = "bold 40px sans-serif";
                 ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                 ctx.fillText(`?`, w/2, h/2);
                 ctx.font = "bold 24px sans-serif";
                 ctx.fillText(`${n1}/${d1}`, w/2 - 80, h/2 + 70);
                 ctx.fillText(`${n2}/${d2}`, w/2 + 80, h/2 + 70);
            };
            let correctAnswer = (n1/d1 > n2/d2) ? `${n1}/${d1}` : `${n2}/${d2}`;
            let answers = [`${n1}/${d1}`, `${n2}/${d2}`, "They are equal", "Cannot tell"];
            q.options = this.shuffleOptions(answers);
            q.correctIndex = q.options.indexOf(correctAnswer);

        } else if (type === "equivalent_simple" || type === "equivalent") {
            const bases = type === "equivalent_simple" ? [{n:1,d:2}, {n:1,d:3}, {n:1,d:4}] : [{n:1,d:2}, {n:1,d:3}, {n:2,d:3}, {n:1,d:4}, {n:3,d:4}, {n:1,d:5}];
            const base = bases[Math.floor(Math.random() * bases.length)];
            const multiplier = type === "equivalent_simple" ? 2 : Math.floor(Math.random() * 3) + 2;
            const givenN = base.n * multiplier;
            const givenD = base.d * multiplier;
            
            q.text = `Which fraction is equivalent to ${givenN}/${givenD}?`;
            q.drawVisual = (ctx, w, h) => { this.drawBarModel(ctx, w/2 - 100, h/2 - 30, 200, 60, givenN, givenD, "#3b82f6"); };
            
            let correctAnswer = `${base.n}/${base.d}`;
            let wrong1 = `${base.n+1}/${base.d}`;
            let wrong2 = `${base.n}/${base.d+1}`;
            let wrong3 = `${base.n*2}/${base.d+3}`;
            let answers = [correctAnswer, wrong1, wrong2, wrong3];
            q.options = this.shuffleOptions(answers);
            q.correctIndex = q.options.indexOf(correctAnswer);

        } else if (type === "add_like" || type === "subtract_like") {
            const isAdd = type === "add_like";
            const d = Math.floor(Math.random() * 5) + 3; // 3 to 7
            let n1, n2;
            if (isAdd) {
                n1 = Math.floor(Math.random() * (d-2)) + 1;
                n2 = Math.floor(Math.random() * (d-n1)) + 1;
            } else {
                n1 = Math.floor(Math.random() * (d-2)) + 2; 
                n2 = Math.floor(Math.random() * (n1-1)) + 1; 
            }
            
            q.text = isAdd ? `Add: ${n1}/${d} + ${n2}/${d} = ?` : `Subtract: ${n1}/${d} - ${n2}/${d} = ?`;
            q.drawVisual = (ctx, w, h) => {
                 this.drawPieChart(ctx, w/2 - 100, h/2, 40, n1, d);
                 this.drawPieChart(ctx, w/2 + 100, h/2, 40, n2, d);
                 ctx.font = "bold 40px sans-serif";
                 ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                 ctx.fillText(isAdd?"+":"-", w/2, h/2);
            };
            let ansN = isAdd ? n1+n2 : n1-n2;
            let correctAnswer = `${ansN}/${d}`;
            let answers = [ correctAnswer, isAdd ? `${n1+n2}/${d+d}` : `${n1-n2}/0`, `${n1*n2}/${d}`, `${Math.abs(n1-n2)}/${d}` ];
            while(new Set(answers).size < 4) {
                answers[3] = `${Math.floor(Math.random()*8)+1}/${d}`;
                if(new Set(answers).size < 4) answers[2] = `${Math.floor(Math.random()*5)+1}/${d+d}`;
            }
            q.options = this.shuffleOptions(answers);
            q.correctIndex = q.options.indexOf(correctAnswer);

        } else if (type === "add_unlike" || type === "subtract_unlike") {
            const isAdd = type === "add_unlike";
            const pairs = isAdd ? [
                {n1: 1, d1: 2, n2: 1, d2: 4, nA: 3, dA: 4},
                {n1: 1, d1: 2, n2: 1, d2: 6, nA: 4, dA: 6},
                {n1: 1, d1: 3, n2: 1, d2: 6, nA: 3, dA: 6},
                {n1: 1, d1: 4, n2: 1, d2: 8, nA: 3, dA: 8},
                {n1: 1, d1: 2, n2: 3, d2: 8, nA: 7, dA: 8}
            ] : [
                {n1: 1, d1: 2, n2: 1, d2: 4, nA: 1, dA: 4},
                {n1: 1, d1: 2, n2: 1, d2: 6, nA: 2, dA: 6},
                {n1: 1, d1: 3, n2: 1, d2: 6, nA: 1, dA: 6},
                {n1: 3, d1: 4, n2: 1, d2: 8, nA: 5, dA: 8},
                {n1: 1, d1: 2, n2: 3, d2: 8, nA: 1, dA: 8}
            ];
            const pair = pairs[Math.floor(Math.random() * pairs.length)];
            q.text = isAdd ? `Add: ${pair.n1}/${pair.d1} + ${pair.n2}/${pair.d2} = ?` : `Subtract: ${pair.n1}/${pair.d1} - ${pair.n2}/${pair.d2} = ?`;
            q.drawVisual = (ctx, w, h) => {
                 this.drawPieChart(ctx, w/2 - 100, h/2, 40, pair.n1, pair.d1);
                 this.drawPieChart(ctx, w/2 + 100, h/2, 40, pair.n2, pair.d2);
                 ctx.font = "bold 40px sans-serif";
                 ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                 ctx.fillText(isAdd?"+":"-", w/2, h/2);
            };
            let correctAnswer = `${pair.nA}/${pair.dA}`;
            let answers = [ correctAnswer, `${pair.n1 + pair.n2}/${pair.d1 + pair.d2}`, `${Math.max(1, pair.nA - 1)}/${pair.dA}`, `${pair.nA + 1}/${pair.dA}` ];
            while(new Set(answers).size < 4) { answers[3] = `${Math.floor(Math.random()*5)+1}/${pair.dA}`; }
            q.options = this.shuffleOptions(answers);
            q.correctIndex = q.options.indexOf(correctAnswer);

        } else if (type === "multiply") {
            const n1 = Math.floor(Math.random() * 3) + 1;
            const d1 = Math.floor(Math.random() * 3) + 2 + n1;
            const n2 = Math.floor(Math.random() * 3) + 1;
            const d2 = Math.floor(Math.random() * 3) + 2 + n2;
            const nA = n1 * n2;
            const dA = d1 * d2;
            q.text = `Multiply: ${n1}/${d1} × ${n2}/${d2} = ?`;
             q.drawVisual = (ctx, w, h) => {
                 this.drawEquation(ctx, w, h, `${n1}/${d1}`, "×", `${n2}/${d2}`);
            };
            let correctAnswer = `${nA}/${dA}`;
            let answers = [ correctAnswer, `${n1+n2}/${d1*d2}`, `${n1*n2}/${d1+d2}`, `${nA*2}/${dA}` ];
             while(new Set(answers).size < 4) { answers[3] = `${Math.floor(Math.random()*5)+1}/${dA}`; }
            q.options = this.shuffleOptions(answers);
            q.correctIndex = q.options.indexOf(correctAnswer);
        }
        return q;
    },
    shuffleOptions(arr) {
        let copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    },
    drawPieChart(ctx, cx, cy, r, n, d) {
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 4;
        
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = "#334155";
        ctx.fill();
        ctx.shadowColor = 'transparent'; 

        const anglePerPart = (Math.PI * 2) / d;
        
        let grad = ctx.createLinearGradient(cx-r, cy-r, cx+r, cy+r);
        grad.addColorStop(0, '#60a5fa');
        grad.addColorStop(1, '#2563eb');
        ctx.fillStyle = grad; 
        
        for (let i = 0; i < n; i++) {
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, i * anglePerPart, (i + 1) * anglePerPart);
            ctx.lineTo(cx, cy); ctx.fill();
        }

        ctx.strokeStyle = "#0f172a"; 
        ctx.lineWidth = 3;
        for (let i = 0; i < d; i++) {
            ctx.beginPath(); ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r * Math.cos(i * anglePerPart), cy + r * Math.sin(i * anglePerPart));
            ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
    },
    drawBarModel(ctx, x, y, w, h, n, d, color) {
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 4;
        ctx.fillStyle = "#334155"; 
        ctx.fillRect(x, y, w, h);
        ctx.shadowColor = 'transparent';

        const partW = w / d;
        let grad = ctx.createLinearGradient(x, y, x, y+h);
        grad.addColorStop(0, '#34d399');
        grad.addColorStop(1, '#059669');
        ctx.fillStyle = grad;
        
        for (let i = 0; i < n; i++) ctx.fillRect(x + i * partW, y, partW, h);
        
        ctx.strokeStyle = "#0f172a";
        ctx.lineWidth = 3;
        for (let i = 1; i < d; i++) {
            ctx.beginPath(); ctx.moveTo(x + i * partW, y); ctx.lineTo(x + i * partW, y + h); ctx.stroke();
        }
        ctx.strokeRect(x, y, w, h);
    },
    drawEquation(ctx, w, h, f1, op, f2) {
        ctx.font = "bold 48px sans-serif";
        ctx.fillStyle = "white"; 
        ctx.textAlign = "center"; 
        ctx.textBaseline = "middle";
        
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetY = 2;

        let [n1,d1] = f1.split('/');
        let [n2,d2] = f2.split('/');

        ctx.fillStyle = "#60a5fa"; ctx.fillText(n1, w/2 - 80, h/2 - 25);
        ctx.fillStyle = "#34d399"; ctx.fillText(d1, w/2 - 80, h/2 + 25);
        ctx.fillRect(w/2 - 110, h/2 - 2, 60, 4);

        ctx.fillStyle = "#60a5fa"; ctx.fillText(n2, w/2 + 80, h/2 - 25);
        ctx.fillStyle = "#34d399"; ctx.fillText(d2, w/2 + 80, h/2 + 25);
        ctx.fillRect(w/2 + 50, h/2 - 2, 60, 4);

        ctx.fillStyle = "white";
        ctx.fillText(op, w/2, h/2);
        
        ctx.shadowColor = 'transparent';
    }
};

// --- ENGINE & PHYSICS ---
class AABB {
    constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; }
    intersects(other) {
        return this.x < other.x + other.w && this.x + this.w > other.x &&
               this.y < other.y + other.h && this.y + this.h > other.y;
    }
}

class Entity extends AABB {
    constructor(x, y, w, h) { super(x, y, w, h); this.vx = 0; this.vy = 0; this.dead = false; this.type = 'entity'; this.stompable = true; }
    update(dt) {}
    draw(ctx) {}
}

class Projectile extends Entity {
    constructor(x, y, vx, vy, color, isPlayer) {
        super(x - 6, y - 6, 12, 12);
        this.vx = vx; this.vy = vy; this.color = color; this.isPlayer = isPlayer; this.life = 1.5;
    }
    update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt;
        if (this.life <= 0) this.dead = true;
        let col = Math.floor((this.x + this.w/2) / TILE_SIZE);
        let row = Math.floor((this.y + this.h/2) / TILE_SIZE);
        if (row >= 0 && row < mapHeight && col >= 0 && col < mapWidth) {
            if (tileMap[row][col] === '2') {
                this.dead = true;
                for(let p=0; p<5; p++) particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, this.color));
            }
        }
    }
    draw(ctx) {
        ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(this.x + this.w/2, this.y + this.h/2, this.w/2, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Player extends Entity {
    constructor(x, y) {
        super(x, y, 24, 32); 
        this.gravity = 1400; 
        this.jumpForce = -750; 
        this.acceleration = 1500;
        this.maxSpeed = 220; 
        this.isGrounded = false;
        this.facingLeft = false;
        this.walkCycle = 0;
        this.invulnerableTime = 0;
        this.shootCooldown = 0;
    }
    update(dt) {
        if (this.invulnerableTime > 0) this.invulnerableTime -= dt;
        if (this.shootCooldown > 0) this.shootCooldown -= dt;

        let moveForce = 0;
        if (keys.left) { moveForce -= this.acceleration; this.facingLeft = true; }
        if (keys.right) { moveForce += this.acceleration; this.facingLeft = false; }

        if (moveForce !== 0) {
            this.vx += moveForce * dt;
            this.vx = Math.max(-this.maxSpeed, Math.min(this.maxSpeed, this.vx));
            this.walkCycle += Math.abs(this.vx) * dt;
        } else {
            this.vx *= this.isGrounded ? 0.8 : 0.95; 
            this.walkCycle = 0;
        }

        if (keys.shoot && this.shootCooldown <= 0) {
            this.shootCooldown = 0.4;
            let pvx = this.facingLeft ? -400 : 400;
            playerProjectiles.push(new Projectile(this.x + this.w/2 + (this.facingLeft?-10:10), this.y + 10, pvx, 0, "#a855f7", true));
        }

        this.x += this.vx * dt;
        this.handleCollisions(true);

        this.vy += this.gravity * dt;
        if (keys.up && this.isGrounded) {
            this.vy = this.jumpForce;
            this.isGrounded = false;
            createJumpParticles(this.x + this.w/2, this.y + this.h);
        }

        this.y += this.vy * dt;
        this.isGrounded = false; 
        this.handleCollisions(false);

        if (this.x < 0) { this.x = 0; this.vx = 0; }
        if (this.y > mapHeight * TILE_SIZE + 200) hurtPlayer();
    }
    handleCollisions(xAxis) {
        let colStart = Math.floor(this.x / TILE_SIZE), colEnd = Math.floor((this.x + this.w) / TILE_SIZE);
        let rowStart = Math.floor(this.y / TILE_SIZE), rowEnd = Math.floor((this.y + this.h) / TILE_SIZE);

        for (let r = rowStart; r <= rowEnd; r++) {
            for (let c = colStart; c <= colEnd; c++) {
                if (r >= 0 && r < mapHeight && c >= 0 && c < mapWidth) {
                    if (tileMap[r][c] === '2') { 
                        let tileRect = { x: c * TILE_SIZE, y: r * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE };
                        if (this.intersects(tileRect)) {
                            if (xAxis) {
                                if (this.vx > 0) { this.x = tileRect.x - this.w; this.vx = 0; } 
                                else if (this.vx < 0) { this.x = tileRect.x + tileRect.w; this.vx = 0; }
                            } else {
                                if (this.vy > 0) { this.y = tileRect.y - this.h; this.vy = 0; this.isGrounded = true; } 
                                else if (this.vy < 0) { this.y = tileRect.y + tileRect.h; this.vy = 0; }
                            }
                        }
                    }
                }
            }
        }
    }
    draw(ctx) {
        if (this.invulnerableTime > 0 && Math.floor(this.invulnerableTime * 10) % 2 === 0) return; 
        ctx.save();
        let cx = this.x + this.w/2; let cy = this.y + this.h; 
        ctx.translate(cx, cy);
        if (this.facingLeft) ctx.scale(-1, 1); 

        let squash = 1; let stretch = 1;
        if (!this.isGrounded) { stretch = 1.05; squash = 0.95; }
        ctx.scale(squash, stretch);

        let bounce = Math.sin(this.walkCycle * 0.2) * 2;

        ctx.fillStyle = "#16a34a"; ctx.beginPath(); ctx.ellipse(-6, -6, 6, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#22c55e"; ctx.beginPath(); ctx.ellipse(0, -14 - bounce, 14, 12, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#86efac"; ctx.beginPath(); ctx.ellipse(2, -12 - bounce, 8, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#22c55e"; ctx.beginPath(); ctx.ellipse(6, -6 - bounce/2, 6, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(4, -22 - bounce, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-4, -24 - bounce, 5, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(6, -22 - bounce, 2.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-2, -24 - bounce, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#7c3aed"; ctx.beginPath(); ctx.ellipse(0, -25 - bounce, 12, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(-8, -25 - bounce); ctx.lineTo(8, -25 - bounce); ctx.lineTo(0, -42 - bounce); ctx.fill(); 
        ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(0, -32 - bounce, 2, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }
}

class QuestionItem extends Entity {
    constructor(x, y) {
        super(x + 4, y + 4, 32, 32); 
        this.type = 'question';
        this.startY = this.y;
        this.animTimer = Math.random() * 10;
    }
    update(dt) {
        this.animTimer += dt;
        this.y = this.startY + Math.sin(this.animTimer * 3) * 6;
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h/2;
        ctx.save(); ctx.translate(cx, cy);
        let spin = Math.sin(this.animTimer * 2);
        ctx.scale(spin, 1); 

        ctx.fillStyle = "#fbbf24";
        ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(16, 0); ctx.lineTo(0, 16); ctx.lineTo(-16, 0); ctx.fill();
        ctx.fillStyle = "#fef08a";
        ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(12, 0); ctx.lineTo(0, 12); ctx.lineTo(-12, 0); ctx.fill();
        
        ctx.fillStyle = "#854d0e";
        ctx.font = "bold 20px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.scale(Math.sign(spin) === 0 ? 1 : Math.sign(spin), 1); 
        ctx.fillText("?", 0, 1);
        ctx.restore();
    }
}

// Enemies (Walker, Runner, Flyer, Jumper, Armored, Turret, Ghost, Chaser, Swooper, Bouncer)
class WalkerEnemy extends Entity {
    constructor(x, y) {
        super(x, y + 8, 24, 24); 
        this.vx = -60; this.vy = 0; this.type = 'enemy'; this.animTimer = 0;
    }
    update(dt) {
        this.animTimer += dt; this.vy += 1400 * dt; this.x += this.vx * dt;
        let colStart = Math.floor(this.x / TILE_SIZE), colEnd = Math.floor((this.x + this.w) / TILE_SIZE);
        let r = Math.floor((this.y + this.h - 1) / TILE_SIZE); 
        if (r >= 0 && r < mapHeight) {
            if (this.vx < 0 && (colStart < 0 || tileMap[r][colStart] === '2')) { this.x = (colStart + 1) * TILE_SIZE; this.vx *= -1; } 
            else if (this.vx > 0 && (colEnd >= mapWidth || tileMap[r][colEnd] === '2')) { this.x = colEnd * TILE_SIZE - this.w; this.vx *= -1; }
            let lookAheadCol = this.vx > 0 ? colEnd : colStart;
            if (lookAheadCol >= 0 && lookAheadCol < mapWidth && (r+1 >= mapHeight || tileMap[r + 1][lookAheadCol] !== '2')) this.vx *= -1;
        }
        this.y += this.vy * dt;
        let bottomRow = Math.floor((this.y + this.h) / TILE_SIZE);
        if (bottomRow >= 0 && bottomRow < mapHeight && tileMap[bottomRow][Math.floor((this.x+this.w/2)/TILE_SIZE)] === '2') {
            this.y = bottomRow * TILE_SIZE - this.h; this.vy = 0;
        }
        if (this.y > mapHeight * TILE_SIZE + 50) this.dead = true;
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h;
        ctx.save(); ctx.translate(cx, cy);
        let bounce = Math.sin(this.animTimer * 10) * 3;
        ctx.fillStyle = "#ef4444"; 
        ctx.beginPath(); ctx.moveTo(-12, 0); ctx.quadraticCurveTo(-12, -20 - bounce, 0, -20 - bounce); ctx.quadraticCurveTo(12, -20 - bounce, 12, 0); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?2:-2), -10 - bounce/2, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?2:-2), -10 - bounce/2, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?3:-3), -10 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?3:-3), -10 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class RunnerEnemy extends WalkerEnemy {
    constructor(x, y) { super(x, y); this.vx = -120; }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h; ctx.save(); ctx.translate(cx, cy); let bounce = Math.sin(this.animTimer * 15) * 4;
        ctx.fillStyle = "#f97316"; ctx.beginPath(); ctx.moveTo(-12, 0); ctx.quadraticCurveTo(-12, -18 - bounce, 0, -18 - bounce); ctx.quadraticCurveTo(12, -18 - bounce, 12, 0); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?3:-3), -9 - bounce/2, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?3:-3), -9 - bounce/2, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?4:-4), -9 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?4:-4), -9 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class ArmoredEnemy extends WalkerEnemy {
    constructor(x, y) { super(x, y); this.vx = -40; this.stompable = false; }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h; ctx.save(); ctx.translate(cx, cy); let bounce = Math.sin(this.animTimer * 10) * 3;
        ctx.fillStyle = "#64748b"; ctx.beginPath(); ctx.moveTo(-12, 0); ctx.quadraticCurveTo(-12, -20 - bounce, 0, -20 - bounce); ctx.quadraticCurveTo(12, -20 - bounce, 12, 0); ctx.fill();
        ctx.fillStyle = "#94a3b8"; ctx.beginPath(); ctx.moveTo(-6, -20 - bounce); ctx.lineTo(0, -32 - bounce); ctx.lineTo(6, -20 - bounce); ctx.fill(); // Spike
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?2:-2), -10 - bounce/2, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?2:-2), -10 - bounce/2, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?3:-3), -10 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?3:-3), -10 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class FlyerEnemy extends Entity {
    constructor(x, y) { super(x, y, 24, 24); this.startY = y; this.startX = x; this.type = 'enemy'; this.animTimer = Math.random() * 10; this.range = 80; }
    update(dt) { this.animTimer += dt; this.x = this.startX + Math.sin(this.animTimer * 2) * this.range; this.y = this.startY + Math.cos(this.animTimer * 3) * 10; }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h/2; ctx.save(); ctx.translate(cx, cy);
        ctx.fillStyle = "#64748b"; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 2; let wingSpin = this.animTimer * 20;
        ctx.save(); ctx.translate(-12, -5); ctx.rotate(wingSpin); ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.translate(12, -5); ctx.rotate(-wingSpin); ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.stroke(); ctx.restore();
        ctx.restore();
    }
}

class GhostEnemy extends FlyerEnemy {
    constructor(x, y) { super(x, y); this.range = 150; }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h/2; ctx.save(); ctx.translate(cx, cy);
        ctx.globalAlpha = 0.6; ctx.fillStyle = "#d8b4fe"; ctx.beginPath(); ctx.arc(0, 0, 12, Math.PI, 0); ctx.lineTo(12, 16); ctx.lineTo(6, 12); ctx.lineTo(0, 16); ctx.lineTo(-6, 12); ctx.lineTo(-12, 16); ctx.fill();
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(-4, -2, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -2, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class SwooperEnemy extends FlyerEnemy {
    constructor(x, y) { super(x, y); this.baseY = y; this.range = 0; this.swooping = false; }
    update(dt) {
        this.animTimer += dt;
        if (!this.swooping && Math.abs((player.x + player.w/2) - (this.x + this.w/2)) < 60 && player.y > this.y) { this.swooping = true; this.vy = 400; }
        if (this.swooping) {
            this.y += this.vy * dt; this.vy -= 800 * dt;
            if (this.vy < 0 && this.y < this.baseY) { this.y = this.baseY; this.swooping = false; this.vy = 0; }
        } else { this.y = this.baseY + Math.sin(this.animTimer * 4) * 5; }
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h/2; ctx.save(); ctx.translate(cx, cy);
        ctx.fillStyle = "#0ea5e9"; ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-10, -10); ctx.lineTo(10, -10); ctx.fill();
        ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class TurretEnemy extends Entity {
    constructor(x, y) { super(x, y + 8, 24, 24); this.type = 'enemy'; this.stompable = false; this.timer = Math.random(); }
    update(dt) {
        this.timer += dt;
        if (this.timer > 2.5) {
            this.timer = 0;
            let dx = (player.x + player.w/2) - (this.x + this.w/2); let dy = (player.y + player.h/2) - (this.y + this.h/2);
            let mag = Math.sqrt(dx*dx + dy*dy);
            if (mag < 600) enemyProjectiles.push(new Projectile(this.x+this.w/2, this.y+this.h/2, (dx/mag)*200, (dy/mag)*200, "#ef4444", false));
        }
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h; ctx.save(); ctx.translate(cx, cy);
        ctx.fillStyle = "#334155"; ctx.fillRect(-12, -24, 24, 24);
        ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(0, -12, 6 + Math.sin(this.timer*10)*2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class JumperEnemy extends Entity {
    constructor(x, y) { super(x, y + 8, 24, 24); this.vy = 0; this.type = 'enemy'; this.animTimer = 0; this.jumpTimer = 0; this.isGrounded = false; }
    update(dt) {
        this.animTimer += dt; this.vy += 1400 * dt; this.y += this.vy * dt;
        let bottomRow = Math.floor((this.y + this.h) / TILE_SIZE);
        if (bottomRow >= 0 && bottomRow < mapHeight && tileMap[bottomRow][Math.floor((this.x+this.w/2)/TILE_SIZE)] === '2') {
            this.y = bottomRow * TILE_SIZE - this.h; this.vy = 0; this.isGrounded = true;
        } else { this.isGrounded = false; }
        if (this.isGrounded) {
            this.jumpTimer += dt;
            if (this.jumpTimer > 1.2) { this.vy = -600; this.jumpTimer = 0; this.isGrounded = false; }
        }
        if (this.y > mapHeight * TILE_SIZE + 50) this.dead = true;
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h; ctx.save(); ctx.translate(cx, cy);
        let squash = this.isGrounded ? (1 - Math.min(this.jumpTimer, 1)*0.2) : 1.2; let stretch = this.isGrounded ? (1 + Math.min(this.jumpTimer, 1)*0.2) : 0.8;
        ctx.scale(stretch, squash);
        ctx.fillStyle = "#ec4899"; ctx.beginPath(); ctx.moveTo(-12, 0); ctx.quadraticCurveTo(-12, -24, 0, -24); ctx.quadraticCurveTo(12, -24, 12, 0); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-4, -12, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -12, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(-4, -12, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -12, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class BouncerEnemy extends Entity {
    constructor(x, y) { super(x, y, 20, 20); this.type = 'enemy'; this.vx = 150; this.vy = 150; this.animTimer = 0; }
    update(dt) {
        this.animTimer += dt; this.x += this.vx * dt; this.y += this.vy * dt;
        let col = Math.floor((this.x + this.w/2) / TILE_SIZE), row = Math.floor((this.y + this.h/2) / TILE_SIZE);
        if (row >= 0 && row < mapHeight && col >= 0 && col < mapWidth) {
            if (this.vx > 0 && col+1 < mapWidth && tileMap[row][col+1] === '2') this.vx *= -1;
            else if (this.vx < 0 && col-1 >= 0 && tileMap[row][col-1] === '2') this.vx *= -1;
            if (this.vy > 0 && row+1 < mapHeight && tileMap[row+1][col] === '2') this.vy *= -1;
            else if (this.vy < 0 && row-1 >= 0 && tileMap[row-1][col] === '2') this.vy *= -1;
        }
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h/2; ctx.save(); ctx.translate(cx, cy);
        ctx.rotate(this.animTimer * 5);
        ctx.fillStyle = "#8b5cf6"; ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = "#facc15"; ctx.fillRect(-4, -4, 8, 8);
        ctx.restore();
    }
}

class ChaserEnemy extends WalkerEnemy {
    constructor(x, y) { super(x, y); this.aggro = false; }
    update(dt) {
        this.animTimer += dt; this.vy += 1400 * dt; 
        let dist = Math.abs((player.x + player.w/2) - (this.x + this.w/2));
        if (dist < 200 && Math.abs(player.y - this.y) < 100) { this.aggro = true; this.vx = player.x < this.x ? -100 : 100; } 
        else { this.aggro = false; this.vx = Math.sign(this.vx) * 40; }
        
        this.x += this.vx * dt;
        let colStart = Math.floor(this.x / TILE_SIZE), colEnd = Math.floor((this.x + this.w) / TILE_SIZE);
        let r = Math.floor((this.y + this.h - 1) / TILE_SIZE); 
        if (r >= 0 && r < mapHeight) {
            if (this.vx < 0 && (colStart < 0 || tileMap[r][colStart] === '2')) { this.x = (colStart + 1) * TILE_SIZE; this.vx *= -1; } 
            else if (this.vx > 0 && (colEnd >= mapWidth || tileMap[r][colEnd] === '2')) { this.x = colEnd * TILE_SIZE - this.w; this.vx *= -1; }
            let lookAheadCol = this.vx > 0 ? colEnd : colStart;
            if (!this.aggro && lookAheadCol >= 0 && lookAheadCol < mapWidth && (r+1 >= mapHeight || tileMap[r + 1][lookAheadCol] !== '2')) this.vx *= -1;
        }
        this.y += this.vy * dt;
        let bottomRow = Math.floor((this.y + this.h) / TILE_SIZE);
        if (bottomRow >= 0 && bottomRow < mapHeight && tileMap[bottomRow][Math.floor((this.x+this.w/2)/TILE_SIZE)] === '2') {
            this.y = bottomRow * TILE_SIZE - this.h; this.vy = 0;
        }
    }
    draw(ctx) {
        let cx = this.x + this.w/2; let cy = this.y + this.h; ctx.save(); ctx.translate(cx, cy); let bounce = Math.sin(this.animTimer * 15) * (this.aggro?5:2);
        ctx.fillStyle = this.aggro ? "#dc2626" : "#f87171"; ctx.beginPath(); ctx.moveTo(-12, 0); ctx.quadraticCurveTo(-12, -20 - bounce, 0, -20 - bounce); ctx.quadraticCurveTo(12, -20 - bounce, 12, 0); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?2:-2), -10 - bounce/2, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?2:-2), -10 - bounce/2, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(-4 + (this.vx>0?3:-3), -10 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4 + (this.vx>0?3:-3), -10 - bounce/2, 1.5, 0, Math.PI*2); ctx.fill();
        if (this.aggro) { ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.moveTo(-6, -2); ctx.lineTo(-2, -6); ctx.lineTo(2, -2); ctx.lineTo(6, -6); ctx.stroke(); }
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 200;
        this.vy = (Math.random() - 1) * 200;
        this.life = 1.0;
        this.color = color;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.vy += 800 * dt; // Gravity
        this.y += this.vy * dt;
        this.life -= dt * 2;
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 4, 4);
        ctx.restore();
    }
}

// --- GAME LOGIC ---
function loadLevel(index) {
    if (index >= levelsData.length) { winGame(); return; }
    currentLevelIndex = index; const level = levelsData[index];
    
    tileMap = []; entities = []; particles = []; playerProjectiles = []; enemyProjectiles = [];
    mapHeight = level.map.length; mapWidth = level.map[0].length;
    
    for (let r = 0; r < mapHeight; r++) {
        let row = [];
        for (let c = 0; c < mapWidth; c++) {
            let char = level.map[r][c];
            if (char === '2' || char === '0') { row.push(char); } 
            else {
                row.push('.');
                if (char === 'E') entities.push(new WalkerEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'R') entities.push(new RunnerEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'F') entities.push(new FlyerEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'J') entities.push(new JumperEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'A') entities.push(new ArmoredEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'T') entities.push(new TurretEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'G') entities.push(new GhostEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'C') entities.push(new ChaserEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'S') entities.push(new SwooperEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'B') entities.push(new BouncerEnemy(c * TILE_SIZE, r * TILE_SIZE));
                if (char === 'Q') entities.push(new QuestionItem(c * TILE_SIZE, r * TILE_SIZE)); 
                if (char === 'X') entities.push({ type: 'portal', x: c * TILE_SIZE, y: r * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, intersects: Entity.prototype.intersects });
            }
        }
        tileMap.push(row);
    }
    player = new Player(50, 50);
    document.getElementById('hud-level').innerText = index + 1;
    document.getElementById('hud-status').innerText = "Find the portal!";
    showLesson(level);
}

function showLesson(level) {
    gameState = 'LESSON';
    document.getElementById('lesson-title').innerText = level.title;
    document.getElementById('lesson-content').innerHTML = level.lesson;
    document.getElementById('ui-lesson').classList.remove('hidden');
    document.getElementById('ui-hud').classList.add('hidden');
    if (useTouchControls) document.getElementById('ui-touch').classList.add('hidden');
}

window.closeLessonAndPlay = function() {
    document.getElementById('ui-lesson').classList.add('hidden');
    document.getElementById('ui-hud').classList.remove('hidden');
    if (useTouchControls) {
        document.getElementById('ui-touch').classList.remove('hidden');
        document.getElementById('ui-touch').style.display = 'flex';
    }
    gameState = 'PLAYING';
    lastTime = performance.now();
    keys.left = false; keys.right = false; keys.up = false; keys.shoot = false;
    requestAnimationFrame(gameLoop);
}

function triggerQuestion(ent) {
    for(let i=0; i<15; i++) particles.push(new Particle(ent.x + ent.w/2, ent.y + ent.h/2, "#fbbf24"));
    const levelData = levelsData[currentLevelIndex];
    const q = MathSystem.generateQuestion(levelData.type);
    showQuestion(q);
}

function showQuestion(q) {
    gameState = 'QUESTION';
    keys.left = false; keys.right = false; keys.up = false; keys.shoot = false;
    document.getElementById('ui-question').classList.remove('hidden');
    document.getElementById('question-text').innerText = q.text;
    qCtx.clearRect(0, 0, qCanvas.width, qCanvas.height);
    if (q.drawVisual) q.drawVisual(qCtx, qCanvas.width, qCanvas.height);
    
    const optsContainer = document.getElementById('question-options');
    optsContainer.innerHTML = '';
    q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = "p-4 text-2xl font-bold bg-slate-800 hover:bg-slate-700 text-white border-2 border-slate-600 rounded-xl transition-colors";
        btn.innerText = opt;
        btn.onclick = () => answerQuestion(index === q.correctIndex);
        optsContainer.appendChild(btn);
    });
    document.getElementById('question-feedback').className = "mt-6 text-2xl font-bold hidden h-8";
}

function answerQuestion(isCorrect) {
    const feedback = document.getElementById('question-feedback');
    feedback.classList.remove('hidden');
    document.querySelectorAll('#question-options button').forEach(b => b.disabled = true);

    if (isCorrect) {
        feedback.innerText = "Correct! +100 Points";
        feedback.className = "mt-6 text-2xl font-bold text-emerald-400 h-8";
        score += pointsPerQuestion;
        updateScore();
        saveScoreToCloud();
    } else {
        feedback.innerText = "Incorrect!";
        feedback.className = "mt-6 text-2xl font-bold text-red-400 h-8";
    }

    setTimeout(() => {
        document.getElementById('ui-question').classList.add('hidden');
        gameState = 'PLAYING';
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }, 1500);
}

function hurtPlayer() {
    if (player.invulnerableTime > 0) return;
    player.invulnerableTime = 2.0; 
    score = Math.max(0, score - 25); updateScore(); saveScoreToCloud();
    player.vy = -400;
    if (player.y > mapHeight * TILE_SIZE) {
        player.x = 50; player.y = 50; player.vx = 0; player.vy = 0;
    }
}

function updateScore() { document.getElementById('hud-score').innerText = score; }

function createJumpParticles(x, y) {
    for(let i=0; i<5; i++) particles.push(new Particle(x, y, "#94a3b8"));
}

function winGame() {
    gameState = 'VICTORY';
    document.getElementById('ui-hud').classList.add('hidden');
    document.getElementById('ui-touch').classList.add('hidden');
    document.getElementById('ui-end').classList.remove('hidden');
    document.getElementById('end-title').innerText = "Victory!";
    document.getElementById('end-title').className = "text-6xl font-black text-emerald-400 mb-4 drop-shadow-lg";
    document.getElementById('end-score').innerText = score;
    saveScoreToCloud();
}

// --- MAIN LOOP ---
function update(dt) {
    if (gameState !== 'PLAYING') return;
    player.update(dt);

    for (let i = playerProjectiles.length - 1; i >= 0; i--) {
        let proj = playerProjectiles[i];
        proj.update(dt);
        if (!proj.dead) {
            for (let ent of entities) {
                if (ent.type === 'enemy' && proj.intersects(ent)) {
                    ent.dead = true; proj.dead = true; score += pointsPerEnemy; updateScore(); saveScoreToCloud();
                    for(let p=0; p<15; p++) particles.push(new Particle(ent.x + ent.w/2, ent.y + ent.h/2, proj.color));
                    break;
                }
            }
        }
        if (proj.dead) playerProjectiles.splice(i, 1);
    }

    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        let proj = enemyProjectiles[i];
        proj.update(dt);
        if (!proj.dead && proj.intersects(player)) { hurtPlayer(); proj.dead = true; }
        if (proj.dead) enemyProjectiles.splice(i, 1);
    }

    for (let i = entities.length - 1; i >= 0; i--) {
        let ent = entities[i];
        if (ent.type === 'enemy') {
            ent.update(dt);
            if (player.intersects(ent)) {
                if (ent.stompable && player.vy > 0 && player.y + player.h < ent.y + ent.h/2 + 15) {
                    ent.dead = true; player.vy = player.jumpForce * 0.8; 
                    score += pointsPerEnemy; updateScore(); saveScoreToCloud();
                    for(let p=0; p<15; p++) particles.push(new Particle(ent.x + ent.w/2, ent.y + ent.h/2, "#ef4444"));
                } else { hurtPlayer(); }
            }
        } else if (ent.type === 'portal') {
            if (player.intersects(ent)) { loadLevel(currentLevelIndex + 1); return; }
        } else if (ent.type === 'question') {
            ent.update(dt);
            if (player.intersects(ent)) {
                ent.dead = true;
                triggerQuestion(ent);
            }
        }
        if (ent.dead) entities.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    let targetCamX = player.x + player.w/2 - CANVAS_WIDTH/2;
    let targetCamY = player.y + player.h/2 - CANVAS_HEIGHT/2;
    targetCamX = Math.max(0, Math.min(targetCamX, mapWidth * TILE_SIZE - CANVAS_WIDTH));
    targetCamY = Math.max(0, Math.min(targetCamY, mapHeight * TILE_SIZE - CANVAS_HEIGHT));
    camera.x += (targetCamX - camera.x) * 5 * dt;
    camera.y += (targetCamY - camera.y) * 5 * dt;
}

function draw() {
    // Dynamic themes (sky, cave, forest, lava, snow)
    let bgColors = ["#0f172a", "#1e1e2f", "#0f2e26", "#2e150f", "#1e3a5f"];
    let themeIdx = currentLevelIndex % 5;
    ctx.fillStyle = bgColors[themeIdx]; 
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    
    ctx.fillStyle = "white";
    for(let i=0; i<40; i++) {
        let sx = (i * 147) % CANVAS_WIDTH;
        let sy = (i * 191 + performance.now()*0.02) % CANVAS_HEIGHT;
        ctx.globalAlpha = Math.sin((performance.now() + i*1000) * 0.001) * 0.5 + 0.2;
        ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1.0;

    if (gameState === 'LOGIN' || gameState === 'MENU') return;

    ctx.save(); ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

    let startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE));
    let endCol = Math.min(mapWidth, startCol + (CANVAS_WIDTH / TILE_SIZE) + 1);
    let startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
    let endRow = Math.min(mapHeight, startRow + (CANVAS_HEIGHT / TILE_SIZE) + 1);

    for (let r = startRow; r < endRow; r++) {
        for (let c = startCol; c < endCol; c++) {
            let tile = tileMap[r][c]; let tx = c * TILE_SIZE; let ty = r * TILE_SIZE;
            if (tile === '2') {
                let isTop = (r === 0 || tileMap[r-1][c] !== '2');
                let tileColors = ["#475569", "#52525b", "#3f6212", "#78350f", "#334155"];
                let topColors = ["#10b981", "#a1a1aa", "#65a30d", "#d97706", "#94a3b8"];
                ctx.fillStyle = tileColors[themeIdx]; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 2; ctx.strokeRect(tx, ty, TILE_SIZE, TILE_SIZE);
                ctx.beginPath(); ctx.moveTo(tx, ty + TILE_SIZE/2); ctx.lineTo(tx + TILE_SIZE, ty + TILE_SIZE/2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(tx + TILE_SIZE/2, ty); ctx.lineTo(tx + TILE_SIZE/2, ty + TILE_SIZE/2); ctx.stroke();
                if (isTop) { ctx.fillStyle = topColors[themeIdx]; ctx.fillRect(tx, ty, TILE_SIZE, 8); }
            }
        }
    }

    entities.forEach(ent => {
        if (ent.type === 'portal') {
            let spin = performance.now() / 200;
            ctx.save(); ctx.translate(ent.x + ent.w/2, ent.y + ent.h/2); ctx.rotate(spin);
            ctx.fillStyle = "#a855f7"; ctx.beginPath(); ctx.arc(0, 0, 16 + Math.sin(spin)*4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#f3e8ff"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        } else { ent.draw(ctx); }
    });

    player.draw(ctx);
    playerProjectiles.forEach(p => p.draw(ctx));
    enemyProjectiles.forEach(p => p.draw(ctx));
    particles.forEach(p => p.draw(ctx));
    ctx.restore();
}

function gameLoop(timestamp) {
    if (gameState === 'PLAYING') {
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.05) dt = 0.05; // Prevent large skips
        lastTime = timestamp;
        update(dt); draw();
        animationFrameId = requestAnimationFrame(gameLoop);
    }
}

// --- INPUT & INIT ---
window.addEventListener('keydown', (e) => {
    if (gameState !== 'PLAYING') return;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = true;
    if (e.code === 'KeyZ' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shoot = true;
});
window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
    if (e.code === 'KeyZ' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shoot = false;
});

function bindTouch(id, keyObj) {
    const el = document.getElementById(id);
    if(!el) return;
    const press = (e) => { e.preventDefault(); keys[keyObj] = true; };
    const release = (e) => { e.preventDefault(); keys[keyObj] = false; };
    el.addEventListener('touchstart', press, {passive: false});
    el.addEventListener('touchend', release, {passive: false});
    el.addEventListener('touchcancel', release, {passive: false});
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
}
bindTouch('btn-left', 'left'); bindTouch('btn-right', 'right'); bindTouch('btn-jump', 'up'); bindTouch('btn-shoot', 'shoot');

// Initialize
initFirebase();
window.onload = () => draw();
</script>
